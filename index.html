<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="StronaGlowna" class="widok">
        <div id="Logo">Tutaj miejsce na logo</div>
        <div id="KafelekWyszukaj" class="klasa">Wyszukaj</div>
        <div id="KafelekRanking" class="klasa">Ranking</div>
        <div id="KafelekNowosci" class="klasa">Nowosci</div>
        <div id="KafelekUlubione" class="klasa">Ulubione</div>
    </div>
    <div id="Wyszukaj" class ="widok ukryty">
        <button class="przycisk-powrot">Wróć do menu</button>
        <form>
            <label for="Wyszukaj">Wyszukaj:</label>
            <input type="text" id="szukanie">
        </form>
    </div>
    <div id="Ranking" class="widok ukryty">
        <button class="przycisk-powrot">Wróć do menu</button>
        <h2>Ranking TOP 50 Piosenek worldwide</h2>
        <p>Tutaj znajdziesz ranking.</p>
    </div>
</body>
</html>
